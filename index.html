<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cinzel', serif;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, #1a0000, #000000);
      position: relative;
    }

    h1 {
      font-family: 'UnifrakturCook', cursive;
      font-size: 4rem;
      color: #b30000;
      text-shadow: 0 0 15px rgba(255,0,0,0.6);
    }

    p.subtitle {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #bbb;
    }

    .photo-wrapper {
      margin-top: 40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(45deg, #b30000, #000);
      box-shadow: 0 0 25px rgba(255,0,0,0.5);
    }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      filter: grayscale(30%) contrast(110%);
    }

    section { padding: 60px 20px; text-align: center; }

    .card {
      max-width: 700px;
      margin: auto;
      padding: 30px;
      border: 1px solid #800000;
      border-radius: 12px;
      background: rgba(20,0,0,0.6);
      box-shadow: 0 0 20px rgba(255,0,0,0.2);
    }

    iframe {
      margin-top: 25px;
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
      background: #111;
    }

    footer {
      padding: 20px;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }

    .moon {
      position: absolute;
      top: 50px;
      right: 50px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, #fff, #aaa);
      border-radius: 50%;
      opacity: 0.1;
    }
  </style>
</head>
<body>

<div class="moon"></div>

<header>
  <h1>You're Invited</h1>
  <p class="subtitle">A Night of Shadows & Celebration</p>

  <!-- FOTO KAMU DI SINI -->
  <div class="photo-wrapper">
    <img src="aset_reni.png" alt="My Photo">
  </div>
</header>

<section>
  <div class="card">
    <h2>🕯 Birthday Party</h2>
    <p style="margin-top:15px;">
        Just a small thing. I’m getting older.
    </p>

    <p style="margin-top:15px;">
      📅 Tanggal: 28 April 2026 <br>
      🕰 Waktu: 20.00 WIB <br>
      📍 Lokasi: Google Meet (detail menyusul)
    </p>

    <!-- GOOGLE FORM EMBED -->
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSetrrWHv3h-FtwiZ1moXJA8NF2Ob4ZQX3Ewb7XYjTyMgLNl9w/viewform?usp=publish-editor">
      Loading…
    </iframe>
  </div>
</section>


<footer>
  Made with 🖤 in darkness
</footer>

</body>
</html>
